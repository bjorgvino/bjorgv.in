<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <div class="split">
    <div class="split-image" {{- with .Site.Params.image }}{{- if .enable }} style="background-image: url('/{{ .file }}')"{{- end }}{{- end }}></div>
    <div class="split-content">
      <main>
        {{- block "main" . }}{{- end }}
      </main>
      {{- partial "footer.html" . -}}
    </div>
  </div>
</body>
</html>
